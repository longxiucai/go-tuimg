name: release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64

    steps:
      - uses: actions/checkout@v4

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p output
          go build -o ./output/go-tuimg-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.goos == 'windows' && '.exe' || '' }} .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: go-tuimg-${{ matrix.goos }}-${{ matrix.goarch }}
          path: output/

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Show artifacts
        run: find artifacts -type f

      - name: Package
        run: |
          mkdir -p release

          find artifacts -type f | while read file; do
            chmod +x "$file"
            name=$(basename "$file")
            if [[ "$name" == *.exe ]]; then
              zip -j "release/${name%.exe}.zip" "$file"
            else
              tar -czf "release/${name}.tar.gz" -C "$(dirname "$file")" "$name"
            fi
          done

      - name: Show release files
        run: ls -lh release

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*